---
name: Continuous integration

on:
    push:
        branches: [main]
    pull_request:
        types: [opened, reopened, synchronize]
    merge_group:

permissions: {}

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
    build:
        runs-on: ubuntu-latest
        permissions:
            contents: read # required for actions/checkout to read the workflow source
        strategy:
            matrix:
                node-version: [24.x, 26.x]
        name: Node.js v${{ matrix.node-version }}
        steps:
            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  persist-credentials: false
            - name: Use Node.js
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version: ${{ matrix.node-version }}
            - name: Install dependencies
              run: npm clean-install
            - name: Static Code Analysis
              run: npx just lint
            - name: Compile Typescript
              run: npx just compile
            - name: Run tests
              run: npx just test
            - name: Dry-run publish
              run: npx just publish-dry-run
              env:
                  NPM_TOKEN: dry-run

    mutation-testing:
        runs-on: ubuntu-latest
        name: Mutation testing
        permissions:
            contents: read # required for actions/checkout to read the workflow source
        steps:
            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  persist-credentials: false
            - name: Use Node.js
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version: 26.x
            - name: Install dependencies
              run: npm clean-install
            - name: Run mutation tests
              run: npx just test-mutation

    benchmarks:
        runs-on: ubuntu-latest
        name: Benchmarks
        permissions:
            contents: read # required for actions/checkout to read the workflow source
        steps:
            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  persist-credentials: false
            - name: Use Node.js
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version: 26.x
            - name: Install dependencies
              run: npm clean-install
            - name: Run benchmarks
              run: npx just benchmark

    workflow-security:
        runs-on: ubuntu-latest
        name: Workflow security analysis
        permissions:
            contents: read # required for actions/checkout to read the workflow source
            security-events: write # required by zizmor-action to upload SARIF to code scanning
        steps:
            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  persist-credentials: false
            - name: Run zizmor
              id: zizmor
              uses: zizmorcore/zizmor-action@192e21d79ab29983730a13d1382995c2307fbcaa # v0.5.7
              with:
                  version: 1.25.2
                  persona: pedantic
                  min-severity: informational
                  min-confidence: low
                  config: .github/zizmor.yml
            - name: Fail if zizmor reported findings
              env:
                  SARIF_FILE: ${{ steps.zizmor.outputs.output-file }}
              run: |
                  count="$(jq '[.runs[].results[]] | length' "$SARIF_FILE")"
                  echo "zizmor findings: $count"
                  test "$count" -eq 0
