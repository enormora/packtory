---
name: Continuous integration

on:
    push:
        branches: [main]
    pull_request:
        types: [opened, reopened, synchronize]
    merge_group:

permissions: {}

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
    build:
        runs-on: ubuntu-latest
        permissions:
            contents: read # required for actions/checkout to read the workflow source
        strategy:
            matrix:
                node-version: [24.x, 26.x]
        name: Node.js v${{ matrix.node-version }}
        steps:
            - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
              with:
                  persist-credentials: false
            - name: Use Node.js
              uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
              with:
                  node-version: ${{ matrix.node-version }}
            - name: Install dependencies
              run: npm clean-install --ignore-scripts
            - name: Static Code Analysis
              run: npx just lint
            - name: Compile Typescript
              run: npx just compile
            - name: Run tests
              run: npx just test
            - name: Dry-run publish
              run: npx just publish-dry-run
              env:
                  NPM_TOKEN: dry-run

    mutation-testing:
        runs-on: ubuntu-latest
        name: Mutation testing
        permissions:
            contents: read # required for actions/checkout to read the workflow source
        steps:
            - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
              with:
                  persist-credentials: false
            - name: Use Node.js
              uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
              with:
                  node-version: 26.x
            - name: Install dependencies
              run: npm clean-install --ignore-scripts
            - name: Run mutation tests
              run: npx just test-mutation

    benchmarks:
        runs-on: ubuntu-latest
        name: Benchmarks
        permissions:
            contents: read # required for actions/checkout to read the workflow source
        steps:
            - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
              with:
                  persist-credentials: false
            - name: Use Node.js
              uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
              with:
                  node-version: 26.x
            - name: Install dependencies
              run: npm clean-install --ignore-scripts
            - name: Build benchmark native dependency
              run: npm rebuild node-pty
            - name: Run benchmarks
              run: npx just benchmark

    workflow-security:
        runs-on: ubuntu-latest
        name: Workflow security analysis
        permissions:
            contents: read # required for actions/checkout to read the workflow source
            security-events: write # required by zizmor-action to upload SARIF to code scanning
        steps:
            - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
              with:
                  persist-credentials: false
            - name: Run zizmor
              id: zizmor
              uses: zizmorcore/zizmor-action@6599ee8b7a49aef6a770f63d261d214911a7ce02 # v0.6.0
              with:
                  version: 1.26.1
                  persona: pedantic
                  min-severity: informational
                  min-confidence: low
                  config: .github/zizmor.yml
            - name: Fail if zizmor reported findings
              env:
                  SARIF_FILE: ${{ steps.zizmor.outputs.output-file }}
              run: |
                  count="$(jq '[.runs[].results[]] | length' "$SARIF_FILE")"
                  echo "zizmor findings: $count"
                  test "$count" -eq 0
