---
# All audits run with defaults; only the configurable audits are overridden
# below. Persona, severity floor, and confidence floor are set on the
# zizmor action invocation in .github/workflows/ci.yml.

rules:
    unpinned-uses:
        config:
            policies:
                '*': hash-pin

    secrets-outside-env:
        config:
            allow: []
